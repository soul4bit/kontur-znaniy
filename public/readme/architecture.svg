<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Архитектура Контур Знаний</title>
  <desc id="desc">Схема компонентов приложения: браузер, Next.js, PostgreSQL, SMTP и файловое хранилище</desc>
  <defs>
    <style>
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 16px Inter, Segoe UI, Arial, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); fill: none; }
      .label { font: 600 14px Inter, Segoe UI, Arial, sans-serif; fill: #0f766e; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#e2e8f0"/>

  <rect class="card" x="70" y="120" width="260" height="130"/>
  <text class="title" x="100" y="168">Браузер</text>
  <text class="text" x="100" y="200">/app, /auth</text>
  <text class="text" x="100" y="225">Tiptap Editor UI</text>

  <rect class="card" x="420" y="80" width="420" height="220"/>
  <text class="title" x="450" y="128">Next.js 16 (Node.js)</text>
  <text class="text" x="450" y="162">API routes: /api/auth, /api/articles</text>
  <text class="text" x="450" y="188">SSR страницы и middleware</text>
  <text class="text" x="450" y="214">Рендер markdown/html + wiki links</text>
  <text class="text" x="450" y="240">Code snippets + copy + highlight.js</text>

  <rect class="card" x="930" y="70" width="280" height="140"/>
  <text class="title" x="960" y="118">PostgreSQL</text>
  <text class="text" x="960" y="152">users, sessions, articles</text>
  <text class="text" x="960" y="177">FTS search index</text>

  <rect class="card" x="930" y="250" width="280" height="120"/>
  <text class="title" x="960" y="297">SMTP (Beget)</text>
  <text class="text" x="960" y="330">подтверждение email</text>
  <text class="text" x="960" y="354">сброс пароля</text>

  <rect class="card" x="420" y="390" width="420" height="180"/>
  <text class="title" x="450" y="435">Файлы на сервере</text>
  <text class="text" x="450" y="468">avatars/</text>
  <text class="text" x="450" y="492">article-images/</text>
  <text class="text" x="450" y="516">URL хранится в БД</text>

  <line class="line" x1="330" y1="185" x2="420" y2="185"/>
  <text class="label" x="352" y="172">HTTPS</text>

  <line class="line" x1="840" y1="150" x2="930" y2="140"/>
  <text class="label" x="855" y="125">SQL</text>

  <line class="line" x1="840" y1="245" x2="930" y2="300"/>
  <text class="label" x="846" y="288">SMTP</text>

  <line class="line" x1="630" y1="300" x2="630" y2="390"/>
  <text class="label" x="642" y="355">upload/read</text>

  <rect x="70" y="560" width="1140" height="100" rx="16" ry="16" fill="#0f172a"/>
  <text x="110" y="603" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#f8fafc">
    Nginx + HTTPS + systemd service (nook) + GitHub Actions deploy
  </text>
</svg>
