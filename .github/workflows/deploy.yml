name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -euo pipefail
            APP_DIR=/var/www/kontur-znaniy

            cd "${APP_DIR}"
            git fetch --prune origin main
            git reset --hard FETCH_HEAD
            mkdir -p bin data
            export GOTOOLCHAIN=auto
            go version
            GOFLAGS=-mod=mod go mod download
            GOFLAGS=-mod=mod go build -trimpath -ldflags="-s -w" -o ./bin/kontur-znaniy ./cmd/server

            systemctl restart kontur-znaniy
            systemctl status kontur-znaniy --no-pager
